apiVersion: apps/v1
kind: Deployment
metadata:
  name: comment-commander
  labels:
    app: comment-commander
spec:
  replicas: 1
  strategy:
    type: Recreate  # Single writer for git push + signing key.
  selector:
    matchLabels:
      app: comment-commander
  template:
    metadata:
      labels:
        app: comment-commander
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: comment-commander
          image: ghcr.io/magmamoose/comment-commander:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          # Non-signing secrets come from OCI Vault via ExternalSecret.
          envFrom:
            - secretRef:
                name: comment-commander
          env:
            # SSH signing key comes from 1Password (same key Caleb signs
            # commits with locally). The 1Password operator syncs the SSH
            # Key item into Secret `comment-commander-signing-key`. Verified
            # the operator produces these keys: fingerprint, key-generated-on,
            # key-type, private-key, public-key. Spaces in field labels are
            # mapped to hyphens — so "private key" → `private-key`.
            - name: SSH_SIGNING_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: comment-commander-signing-key
                  key: private-key
            # Non-sensitive identity + behaviour. Defaults mirror
            # ~/repos/magmamoose/.gitconfig, so verified-commit attribution
            # works without ever touching the secret store.
            - name: GIT_AUTHOR_NAME
              value: "CalebSargeant"
            - name: GIT_AUTHOR_EMAIL
              value: "4991715+CalebSargeant@users.noreply.github.com"
            # GHE (pinkroccade.ghe.com). Empty values keep GHE disabled.
            - name: GHE_HOST
              value: "pinkroccade.ghe.com"
            - name: GHE_AUTHOR_NAME
              value: "sargea50"
            - name: GHE_AUTHOR_EMAIL
              value: "Caleb.sargeant@pinkroccade.nl"
            # Restrict webhook-flow processing to PRs where one of these
            # logins has a commit. /process bypasses this — manual = intent.
            - name: INVOLVED_USERS
              value: "CalebSargeant,sargea50"
            # Public URL the bot tells GitHub/GHE to deliver webhooks to.
            # Used by POST /setup-webhook.
            - name: PUBLIC_WEBHOOK_URL
              value: "https://comment-commander.magmamoose.com/webhook"
            - name: LLM_PROVIDER
              value: "deepseek"
            # `deepseek-reasoner` (DeepSeek-R1 series) thinks before answering
            # and skips trivially-fixable comments far less often than
            # `deepseek-chat`. Slower per call, but webhooks are async so
            # request latency doesn't gate the 202.
            - name: LLM_MODEL
              value: "deepseek-reasoner"
            # Copilot's review-author login varies. The legacy bot uses
            # `copilot[bot]` / `github-copilot[bot]`; the newer Copilot
            # Code Review surface posts as plain `Copilot`. Matching in
            # src/processor.py is case-insensitive, so casing here just
            # documents what's expected.
            - name: BOT_LOGINS
              value: "Copilot,copilot[bot],github-copilot[bot]"
            # ALLOWED_REPOSITORIES: comma-separated allow-list ("" = all).
            - name: ALLOWED_REPOSITORIES
              value: ""
            - name: MAX_FILE_BYTES
              value: "180000"
            - name: MAX_COMMENTS_PER_EVENT
              value: "10"
            - name: DRY_RUN
              value: "false"
            - name: LOG_LEVEL
              value: "INFO"
            - name: DEDUPE_DB_PATH
              value: "/var/lib/comment-commander/deliveries.db"
            # Slack channel ID for decision notifications (Magmamoose workspace).
            # Paired with SLACK_BOT_TOKEN from the OCI Vault ExternalSecret.
            # Leave empty to disable Slack posting without removing the token.
            - name: SLACK_CHANNEL_ID
              value: "C0B4YC7FBPZ"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1"
          volumeMounts:
            - name: dedupe
              mountPath: /var/lib/comment-commander
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: dedupe
          persistentVolumeClaim:
            claimName: comment-commander-dedupe
        - name: tmp
          emptyDir: {}
      restartPolicy: Always
