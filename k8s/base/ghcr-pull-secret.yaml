# Image pull secret for ghcr.io/magmamoose/comment-commander while the
# package is private. Reuses the GitHub PAT already stored in OCI Vault
# under `comment-commander-github-pat` (the same one used for cloning PR
# branches and calling the GitHub API). GitHub PATs authenticate to GHCR
# directly, so a separate token isn't required — leaking surface is
# unchanged. The username is irrelevant to GHCR's PAT-based auth, but
# we set it explicitly for readability.
#
# Once you flip the package to public on GHCR, this Secret and the
# `imagePullSecrets` entry on the Deployment become no-ops and can stay
# or be removed — both are valid.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"CalebSargeant","password":"{{ .token }}","auth":"{{ printf "CalebSargeant:%s" .token | b64enc }}"}}}
  data:
    - secretKey: token
      remoteRef:
        key: comment-commander-github-pat
