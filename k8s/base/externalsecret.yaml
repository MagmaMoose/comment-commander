apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: comment-commander
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: comment-commander
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # HMAC secret configured on the GitHub webhook.
    - secretKey: GITHUB_WEBHOOK_SECRET
      remoteRef:
        key: comment-commander-github-webhook-secret

    # Fine-grained PAT scoped to the repos this bot may touch
    # (Contents: read/write, Pull requests: read/write).
    - secretKey: GITHUB_PAT
      remoteRef:
        key: comment-commander-github-pat

    # API key for the configured LLM_PROVIDER.
    - secretKey: LLM_API_KEY
      remoteRef:
        key: comment-commander-llm-api-key

    # Slack bot token for posting decision notifications. Optional —
    # when unset (or paired with an empty SLACK_CHANNEL_ID), the bot
    # silently skips Slack and the rest of the pipeline runs normally.
    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: slack-bot-token

    # PAT for pinkroccade.ghe.com. Optional — set GHE_HOST + this PAT
    # to enable the GHE instance; leave both blank to disable GHE.
    - secretKey: GHE_PAT
      remoteRef:
        key: comment-commander-ghe-pat
