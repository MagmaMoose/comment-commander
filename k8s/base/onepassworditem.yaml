# SSH signing key for the bot's commits. Same key Caleb uses for git
# signing locally (per the magmamoose-scoped overlay of ~/.gitconfig).
# The 1Password operator syncs this item into a Kubernetes Secret of
# the same name; the deployment maps the synced `private_key` field
# onto $SSH_SIGNING_PRIVATE_KEY.
#
# Vault: Tech (Sargeant 1Password account).
# Item:  GitHub Authentication CalebSargeant (signing key).
#
# Prerequisite: the 1Password Connect server in the `core` namespace
# must have the Tech vault granted to its token. Pink Roccade alone
# is not enough.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: comment-commander-signing-key
spec:
  itemPath: "vaults/zd2eqrrdp52q5d6r4xxyaq47wi/items/raxfcw4kufj3yz6xh3rmp7a7zm"
