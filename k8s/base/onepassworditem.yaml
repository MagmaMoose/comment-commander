# The SSH signing key lives in the user's personal 1Password vault and is
# the same key Caleb uses for git signing locally (per the magmamoose-scoped
# overlay of ~/.gitconfig). The 1Password operator syncs this item into a
# Secret of the same name; the deployment then projects the `private key`
# field as $SSH_SIGNING_PRIVATE_KEY.
#
# Prerequisite: the 1Password Connect server in the `core` namespace must
# have a service-account token scoped to a vault that includes this item.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: comment-commander-signing-key
spec:
  itemPath: "vaults/muu6kpi4oiuhwamhwjrunt7p3u/items/u3oovdd73gvofrmo6zxqszhw2e"
