name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: read
      id-token: write
    steps:
      # Only build pr-<N> images when the PR actually touches files that
      # change what ends up in the production image. Doc-only or k8s-only
      # PRs leave `build` as a green no-op so the required status check
      # still passes without burning registry storage on a byte-different
      # artifact we would never deploy.
      - name: Detect image-relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            image:
              - 'src/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - 'requirements.txt'
              - '.github/workflows/ci.yml'

      - name: Skip build — no image-relevant changes
        if: steps.filter.outputs.image != 'true'
        run: |
          echo "PR touches only files outside the image build context"
          echo "(src/, Dockerfile, docker-bake.hcl, requirements.txt, .github/workflows/ci.yml)."
          echo "Skipping pr-<N> image build to avoid burning registry storage on an artifact we'd never deploy."

      - uses: calebsargeant/semantic-release@v1
        if: steps.filter.outputs.image == 'true'
        with:
          mode: ci
          image_name: comment-commander

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest
